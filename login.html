<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login Sistema Questura</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a252f; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        h3 { color: #2c3e50; margin-bottom: 20px; font-size: 18px; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px; }
        input { padding: 12px; text-align: center; width: 100%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { padding: 12px 20px; width: 100%; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #34495e; }
        button:disabled { background: #888; cursor: wait; }
        .error { color: #e74c3c; margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: bold; }
        #loading { display: none; margin-top: 10px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h3>🔒 ACCESSO SISTEMA QUESTURA</h3>
    <input type="text" id="codice" placeholder="INSERISCI CODICE" autocomplete="off">
    <button id="btn-login" onclick="verificaCodice()">ACCEDI</button>
    <div id="status-msg" style="margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; color: #666;"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxm93Nh_VeraHzgtQ9KCBOjPQV4ZlAHvYvg4rNb5D0eCdW6T7gkadlvKhKYflNPa74/exec";

async function verificaCodice() {
    const codice = document.getElementById("codice").value.trim();
    const statusMsg = document.getElementById("status-msg");
    const btn = document.getElementById("btn-login");

    if (!codice) {
        statusMsg.style.color = "#e74c3c";
        statusMsg.textContent = "⚠ Inserisci un codice";
        return;
    }

    // Punto 2: Mostra caricamento
    statusMsg.style.color = "#666";
    statusMsg.textContent = "Verifica validità del codice...";
    btn.disabled = true;

    try {
        const response = await fetch(`${API_URL}?action=login&codice=${encodeURIComponent(codice)}`);
        const data = await response.json();

        if (data.trovato && data.stato) {
            sessionStorage.setItem("accessoAutorizzato", "true");
            sessionStorage.setItem("nomeUtente", data.nome);
            sessionStorage.setItem("codiceUser", codice);
            sessionStorage.setItem("dataAccesso", new Date().toLocaleString('it-IT'));
            
            window.location.replace("databasequestura.html");
        } else {
            // Punto 2: Errore sostituisce il caricamento
            statusMsg.style.color = "#e74c3c";
            statusMsg.textContent = "❌ Codice errato / non valido";
            btn.disabled = false;
        }
    } catch (e) {
        statusMsg.style.color = "#e74c3c";
        statusMsg.textContent = "❌ Errore di connessione";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
