<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Registro - Questura</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        
        /* Layout Intestazione */
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Pulsanti Nuovi */
        .btn-home { background: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add-op { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #2c3e50; color: white; }

        /* Pulsanti Tabella */
        .btn-table-mod { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-table-del { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        /* MODAL STYLE */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; width: 400px; margin: 10% auto; padding: 25px; border-radius: 10px; text-align: center; }
        
        .input-edit { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-size: 16px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-attivo { background: #bdc3c7; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; flex: 1; font-weight: bold; }
        .btn-disattivo { background: #bdc3c7; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; flex: 1; font-weight: bold; }
        
        .btn-save-final { background: #3498db; color: white; width: 100%; margin-top: 20px; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-delete-final { background: #e74c3c; color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; display: none; }

        /* Progress Bar */
        .progress-container { width: 100%; background: #eee; height: 12px; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #e74c3c; border-radius: 10px; transition: linear; }
    </style>
</head>
<body>

    <script>
        // BLOCCO DI SICUREZZA IMMEDIATO
        if (sessionStorage.getItem("accessoAutorizzato") !== "true") {
            window.location.replace("index.html");
        }
    </script>

<div class="container">
    <div class="header-tools">
        <button class="btn-home" onclick="window.location.href='databasequestura.html'">⬅ Torna alla Home</button>
        <h2>📋 Registro Codici</h2>
        <button class="btn-add-op" onclick="apriAggiungi()">+ Aggiungi Operatore</button>
    </div>

    <table id="tabella-codici">
        <thead>
            <tr>
                <th>Operatore</th>
                <th>Matricola</th>
                <th>Stato</th>
                <th>Gestione</th>
            </tr>
        </thead>
        <tbody id="corpo-tabella">
            <tr><td colspan="4" style="text-align:center;">Caricamento in corso...</td></tr>
        </tbody>
    </table>
</div>

<div id="modalAggiungi" class="modal">
    <div class="modal-content">
        <h3>Nuovo Operatore</h3>
        <input type="text" id="add-nome" class="input-edit" placeholder="Nome e Cognome">
        <input type="text" id="add-matricola" class="input-edit" readonly placeholder="Matricola">
        <div class="btn-group">
            <button id="add-opt-attivo" class="btn-attivo" onclick="setStatoAdd('✅ Validità')">ATTIVO</button>
            <button id="add-optisattivo" class="btnisattivo" onclick="setStatoAdd('❌ Non Valido')">DISATTIVO</button>
        </div>
        <button class="btn-save-final" style="background: #27ae60;" onclick="salvaNuovo()">SALVA NEL DATABASE</button>
        <p onclick="chiudiModals()" style="margin-top:15px; cursor:pointer; font-size:13px; color:#7f8c8d;">Annulla</p>
    </div>
</div>

<div id="modalModifica" class="modal">
    <div class="modal-content">
        <h3>Modifica Operatore</h3>
        <p id="edit-nome" style="color: #34495e; font-weight: bold;"></p>
        <input type="text" id="edit-codice" class="input-edit">
        <div class="btn-group">
            <button id="opt-attivo" class="btn-attivo" onclick="setStato('✅ Validità')">ATTIVO</button>
            <button id="optisattivo" class="btnisattivo" onclick="setStato('❌ Non Valido')">DISATTIVO</button>
        </div>
        <button class="btn-save-final" id="btnSalva">CONFERMA E SALVA</button>
        <p onclick="chiudiModals()" style="margin-top:15px; cursor:pointer; font-size:13px; color:#7f8c8d;">Annulla</p>
    </div>
</div>

<div id="modalElimina" class="modal">
    <div class="modal-content">
        <h3 style="color:#c0392b;">Rimuovere Operatore?</h3>
        <div class="progress-container" id="p-container"><div class="progress-bar" id="p-bar"></div></div>
        <button id="btnelete-final" class="btnelete-final" onclick="eseguiEliminazione()">ELIMINA ORA</button>
        <p id="wait-msg" style="font-weight:bold; margin-top:10px;">Attendi 3 secondi...</p>
        <p onclick="chiudiModals()" style="margin-top:15px; cursor:pointer; font-size:13px; color:#7f8c8d;">Annulla</p>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyFC5jq0fJXYvB1uJ-DcQR3dq2X5W1yQeY98KU4KgNm2d5R_PvpsXRhQ_VjhbAtEfk/exec";
    
    // Invia automaticamente il codice con cui l'utente si è loggato
    const ADMIN_KEY = sessionStorage.getItem("codiceUser");
    let rigaAttiva = null;
    let statoScelto = "";
    let codiciEsistenti = [];

    async function caricaTabella() {
        const r = await fetch(`${API_URL}?action=list&adminCode=${ADMIN_KEY}`);
        const data = await r.json();
        const corpo = document.getElementById("corpo-tabella");
        corpo.innerHTML = "";
        codiciEsistenti = data.map(u => u.codice.toString()); // Salva codici esistenti
        data.forEach(u => {
            corpo.innerHTML += `<tr>
                <td>${u.nome}</td>
                <td><code>${u.codice}</code></td>
                <td>${u.stato}</td>
                <td>
                    <button class="btn-table-mod" onclick="apriModifica('${u.riga}', '${u.nome}', '${u.codice}', '${u.stato}')">Modifica</button>
                    <button class="btn-table-del" onclick="apriElimina('${u.riga}')">Rimuovi</button>
                </td>
            </tr>`;
        });
    }

    // --- FUNZIONE AGGIUNGI ---
    function generaMatricola() {
        let nuovoCod;
        do {
            nuovoCod = Math.floor(100000 + Math.random() * 900000).toString();
        } while (codiciEsistenti.includes(nuovoCod));
        return nuovoCod;
    }

    function apriAggiungi() {
        document.getElementById("add-nome").value = "";
        document.getElementById("add-matricola").value = generaMatricola();
        statoScelto = "✅ Validità";
        setStatoAdd(statoScelto);
        document.getElementById("modalAggiungi").style.display = "block";
    }

    function setStatoAdd(s) {
        statoScelto = s;
        document.getElementById("add-opt-attivo").style.background = s.includes("✅") ? "#2ecc71" : "#bdc3c7";
        document.getElementById("add-opt-disattivo").style.background = s.includes("❌") ? "#e74c3c" : "#bdc3c7";
    }

    async function salvaNuovo() {
        const nome = document.getElementById("add-nome").value.trim();
        const matricola = document.getElementById("add-matricola").value;
        if(!nome) { alert("Inserire Nome e Cognome!"); return; }

        const finalUrl = `${API_URL}?action=aggiungi&nome=${encodeURIComponent(nome)}&codice=${matricola}&stato=${encodeURIComponent(statoScelto)}&adminCode=${ADMIN_KEY}`;
        await fetch(finalUrl, { mode: 'no-cors' });
        setTimeout(() => { chiudiModals(); caricaTabella(); }, 500);
    }

    // --- FUNZIONI MODIFICA ED ELIMINA (Inalterate) ---
    function apriModifica(riga, nome, codice, stato) {
        rigaAttiva = riga;
        statoScelto = stato;
        document.getElementById("edit-nome").innerText = nome;
        document.getElementById("edit-codice").value = codice;
        document.getElementById("modalModifica").style.display = "block";
        setStato(stato); 
    }

    function setStato(s) {
        statoScelto = s;
        document.getElementById("opt-attivo").style.background = s.includes("✅") ? "#2ecc71" : "#bdc3c7";
        document.getElementById("opt-disattivo").style.background = s.includes("❌") ? "#e74c3c" : "#bdc3c7";
    }

    document.getElementById("btnSalva").onclick = async function() {
        const nuovoCodice = document.getElementById("edit-codice").value;
        const finalUrl = `${API_URL}?action=updateCompleto&riga=${rigaAttiva}&nuovoCodice=${encodeURIComponent(nuovoCodice)}&nuovoStato=${encodeURIComponent(statoScelto)}&adminCode=${ADMIN_KEY}`;
        await fetch(finalUrl, { mode: 'no-cors' });
        setTimeout(() => { chiudiModals(); caricaTabella(); }, 500);
    };

    function apriElimina(riga) {
        rigaAttiva = riga;
        document.getElementById("modalElimina").style.display = "block";
        const bar = document.getElementById("p-bar");
        const btn = document.getElementById("btn-delete-final");
        document.getElementById("p-container").style.display = "block";
        btn.style.display = "none";
        document.getElementById("wait-msg").style.display = "block";
        bar.style.width = "0%";
        setTimeout(() => { bar.style.transition = "3s"; bar.style.width = "100%"; }, 100);
        setTimeout(() => { btn.style.display = "block"; document.getElementById("wait-msg").style.display = "none"; }, 3100);
    }

    async function eseguiEliminazione() {
        const finalUrl = `${API_URL}?action=rimuovi&riga=${rigaAttiva}&adminCode=${ADMIN_KEY}`;
        await fetch(finalUrl, { mode: 'no-cors' });
        chiudiModals();
        caricaTabella();
    }

    function chiudiModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
    }

    window.onload = caricaTabella;
</script>
</body>
</html>
