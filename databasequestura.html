<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Questura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #ecf0f1; }

        /* Rettangolo Verticale Sinistra */
        .sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px;
            border-right: 8px solid #34495e;
            position: relative; /* Necessario per il posizionamento dello stemma */
            overflow: hidden;
        }

        /* 1) SFONDO STEMMA NELLA SIDEBAR */
        .sidebar::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('pdss.png');
            background-repeat: no-repeat;
            background-position: center 20%; /* Posizionato in alto dietro il nome */
            background-size: 200px;
            opacity: 0.15; /* Trasparenza dello stemma */
            z-index: 0;
            pointer-events: none;
        }

        /* Assicuriamo che il contenuto sia sopra lo sfondo */
        .user-card, .logout {
            position: relative;
            z-index: 1;
        }

        .user-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            backdrop-filter: blur(2px); /* Effetto moderno per leggere meglio il testo */
        }

        .user-card h4 { font-size: 12px; text-transform: uppercase; color: #bdc3c7; margin-bottom: 5px; }
        .user-card p { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .user-card .date { font-size: 13px; font-weight: normal; color: #95a5a6; }

        /* 2) SFONDO IPRPP NELLA PARTE CENTRALE */
        .main-content { 
            flex-grow: 1; 
            padding: 60px; 
            background-image: linear-gradient(rgba(236, 240, 241, 0.85), rgba(236, 240, 241, 0.85)), url('iprpp.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 40%; /* Regola la grandezza del logo centrale */
        }

        h1 { color: #2c3e50; margin-bottom: 30px; font-size: 28px; position: relative; }

        .nav-button {
            background: rgba(255, 255, 255, 0.9); /* Leggermente trasparente per vedere lo sfondo sotto */
            border: 2px solid #2c3e50;
            padding: 25px 40px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .nav-button:hover {
            background: #2c3e50;
            color: white;
            transform: translateY(-2px);
        }

        .btn-text { display: block; font-size: 18px; font-weight: bold; }
        .btn-sub { display: block; font-size: 12px; opacity: 0.8; margin-top: 5px; }

        .logout { margin-top: auto; color: #e74c3c; cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>

    <script>
        if (sessionStorage.getItem("accessoAutorizzato") !== "true") {
            window.location.replace("index.html");
        }
    </script>

    <aside class="sidebar">
        <div class="user-card">
            <h4>Operatore</h4>
            <p id="nome-utente">Caricamento...</p>
            <div class="date">
                Accedi il:<br>
                <span id="data-accesso">--/--/----</span>
            </div>
        </div>
        
        <div class="logout" onclick="logout()">Scollegati dal sistema</div>
    </aside>

    <main class="main-content">
        <h1>HOME</h1>
        
        <div class="button-area" style="display: flex; gap: 20px; flex-wrap: wrap;">
            <button class="nav-button" onclick="window.location.href='autorizzazioni_eventi.html'">
                <span class="btn-text">AUTORIZZAZIONI EVENTI</span>
                <span class="btn-sub">Modulo per compilare le autorizzazione per gli eventi</span>
            </button>

            <button class="nav-button" onclick="window.location.href='autorizzazioni_generiche.html'">
                <span class="btn-text">AUTORIZZAZIONI DIRIGENZA</span>
                <span class="btn-sub">Autorizzazioni specifiche emanate dalla dirigenza</span>
            </button>

            <button id="btn-admin-only" class="nav-button" style="display: none; border-color: #e67e22;" onclick="window.location.href='codiciufficio.html'">
                <span class="btn-text" style="color: #e67e22;">REGISTRO CODICI</span>
                <span class="btn-sub">Gestione dei codici e del personale</span>
            </button>
        </div>
    </main>

<script>
    document.getElementById("nome-utente").textContent = sessionStorage.getItem("nomeUtente") || "Utente";
    document.getElementById("data-accesso").textContent = sessionStorage.getItem("dataAccesso") || "--/--/----";

    if (sessionStorage.getItem("codiceUser") === "129424-D") {
        document.getElementById("btn-admin-only").style.display = "block";
    }

    function logout() {
        sessionStorage.clear();
        window.location.replace("index.html");
    }
</script>
</body>
</html>
