<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema Questura</title>
    <script>
        if (sessionStorage.getItem("accessoAutorizzato") !== "true") {
            window.location.replace("https://dirigenzapds.github.io/database.questori/login.html");
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="welcome-box">
                <p>Benvenuto, <br><strong id="user-name">Caricamento...</strong></p>
                <hr>
                <p id="access-date"></p>
                <button onclick="logout()" style="margin-top:10px; cursor:pointer;">Esci</button>
            </div>
        </aside>

        <main class="content">
            <h1>Dashboard Operativa</h1>
            <div class="button-grid">
                <button onclick="window.location.href='autorizzazioni.html'" class="btn-main">
                    AUTORIZZAZIONI EVENTI
                    <span>[Vai alla gestione]</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        // Funzione per popolare i dati al caricamento
        document.addEventListener("DOMContentLoaded", () => {
            const nome = sessionStorage.getItem("nomeUtente");
            const data = sessionStorage.getItem("dataAccesso");

            if (nome) document.getElementById("user-name").textContent = nome;
            if (data) document.getElementById("access-date").textContent = "Accesso: " + data;
        });

        // Funzione per il logout
        function logout() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
