<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistema Questura</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a252f; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        h3 { color: #2c3e50; margin-bottom: 20px; font-size: 18px; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px; }
        input { padding: 12px; text-align: center; width: 100%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { padding: 12px 20px; width: 100%; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #34495e; }
        button:disabled { background: #888; cursor: wait; }
        #status-msg { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; color: #666; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="box">
    <h3>🔒 ACCESSO SISTEMA QUESTURA</h3>
    <input type="text" id="codice" placeholder="INSERISCI CODICE" autocomplete="off" onkeypress="if(event.key==='Enter') verificaCodice()">
    <button id="btn-login" onclick="verificaCodice()">ACCEDI</button>
    <div id="status-msg"></div>
</div>

<script>
// Assicurati che l'URL termini con /exec
const API_URL = "https://script.google.com/macros/s/AKfycbxm93Nh_VeraHzgtQ9KCBOjPQV4ZlAHvYvg4rNb5D0eCdW6T7gkadlvKhKYflNPa74/exec";

async function verificaCodice() {
    const codiceInput = document.getElementById("codice");
    const codice = codiceInput.value.trim();
    const statusMsg = document.getElementById("status-msg");
    const btn = document.getElementById("btn-login");

    if (!codice) {
        statusMsg.style.color = "#e74c3c";
        statusMsg.textContent = "⚠ Inserisci un codice";
        return;
    }

    statusMsg.style.color = "#666";
    statusMsg.textContent = "Verifica validità in corso...";
    btn.disabled = true;

    try {
        // Aggiungiamo un timestamp per evitare cache del browser (cache busting)
        const finalUrl = `${API_URL}?action=login&codice=${encodeURIComponent(codice)}&t=${new Date().getTime()}`;
        
        const response = await fetch(finalUrl, {
            method: 'GET',
            mode: 'cors', // Cruciale per GitHub Pages
        });

        if (!response.ok) throw new Error("Errore Server");

        const data = await response.json();

        if (data.trovato && (data.stato === true || data.stato === "true")) {
            sessionStorage.setItem("isAdmin", data.isAdmin);
sessionStorage.setItem("codiceUser", codice_inserito_dall_utente); // Assicurati di salvare anche la matricola
            sessionStorage.setItem("accessoAutorizzato", "true");
            sessionStorage.setItem("nomeUtente", data.nome || "Utente");
            sessionStorage.setItem("codiceUser", codice);
            sessionStorage.setItem("dataAccesso", new Date().toLocaleString('it-IT'));
            
            statusMsg.style.color = "#27ae60";
            statusMsg.textContent = "✅ Accesso eseguito! Attendere...";

            // Uso di ./ per garantire che rimanga nella stessa cartella di GitHub Pages
            setTimeout(() => {
                window.location.href = "./databasequestura.html";
            }, 500);
            
        } else {
            statusMsg.style.color = "#e74c3c";
            statusMsg.textContent = "❌ Codice errato o non attivo";
            btn.disabled = false;
        }
    } catch (e) {
        console.error("Errore Login:", e);
        statusMsg.style.color = "#e74c3c";
        statusMsg.textContent = "❌ Errore: Verifica la connessione o l'API";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
